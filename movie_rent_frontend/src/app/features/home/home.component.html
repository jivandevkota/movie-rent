<div class="home">

  <!-- TOP HEADER -->
  <div class="top-header">
    <div class="top-inner">
      <h1 class="logo">MovieRent</h1>
      <div class="top-search">
        <input type="text" placeholder="Search films..." [(ngModel)]="searchText" (keyup.enter)="searchFilms()">
        <button (click)="searchFilms()">Search</button>
      </div>
    </div>
  </div>

  <!-- CATEGORY PILLS -->
  <div class="pills">
    <button class="pill" [class.active]="selectedCategory === null" (click)="loadFilms()">All</button>
    <button class="pill" *ngFor="let cat of categories" [class.active]="selectedCategory === cat.id" (click)="loadByCategory(cat.id)">{{ cat.name }}</button>
  </div>

  <!-- MOST RENTED CAROUSEL -->
  <div class="carousel-wrap" *ngIf="popularFilms.length > 0 && currentMode === 'all'">
    <h2 class="row-title">Most Rented</h2>
    <div class="carousel">
      <div class="carousel-track">
        <div class="carousel-item" *ngFor="let f of popularFilms; let i = index" (click)="openFilmDetails(f.filmId)">
          <img [src]="f.imageUrl" [alt]="f.title" loading="lazy">
          <div class="carousel-item-info">
            <span class="carousel-item-title">{{ f.title }}</span>
          </div>
        </div>
        <div class="carousel-item" *ngFor="let f of popularFilms" (click)="openFilmDetails(f.filmId)">
          <img [src]="f.imageUrl" [alt]="f.title" loading="lazy">
          <div class="carousel-item-info">
            <span class="carousel-item-title">{{ f.title }}</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- FILM GALLERY -->
  <div class="gallery">
    <div class="gallery-header">
      <h2 class="gallery-title">Browse</h2>
      <span class="gallery-count" *ngIf="totalElements > 0">{{ films.length }} of {{ totalElements }}</span>
    </div>

    <div class="gallery-grid" *ngIf="films.length > 0">
      <div class="gallery-item" *ngFor="let film of films" (click)="openFilmDetails(film.filmId)">
        <div class="gallery-img">
          <img [src]="film.imageUrl" [alt]="film.title" loading="lazy">
          <div class="gallery-overlay">
            <mat-icon>play_arrow</mat-icon>
          </div>
        </div>
        <div class="gallery-info">
          <span class="gallery-cat" [ngStyle]="categoryStyle(film.categoryName)">{{ film.categoryName || 'Movie' }}</span>
          <h3 class="gallery-film-title">{{ film.title }}</h3>
        </div>
      </div>
    </div>

    <div class="empty-state" *ngIf="films.length === 0">
      <p>No movies found</p>
    </div>

    <div class="pagination" *ngIf="totalPages > 1">
      <button (click)="firstPage()" [disabled]="page === 0"><mat-icon>first_page</mat-icon></button>
      <button (click)="prevPage()" [disabled]="page === 0"><mat-icon>chevron_left</mat-icon></button>
      <span>{{ page+1 }}/{{ totalPages }}</span>
      <button (click)="nextPage()" [disabled]="page+1 >= totalPages"><mat-icon>chevron_right</mat-icon></button>
      <button (click)="lastPage()" [disabled]="page+1 >= totalPages"><mat-icon>last_page</mat-icon></button>
      <div class="p-goto">
        <span class="p-goto-label">Go</span>
        <input type="number" class="p-goto-input" min="1" [max]="totalPages" [(ngModel)]="gotoPageNumber">
        <button class="p-goto-btn" (click)="goToPage()">Go</button>
      </div>
    </div>
  </div>

</div>
