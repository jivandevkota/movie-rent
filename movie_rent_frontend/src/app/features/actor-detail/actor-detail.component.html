<div class="actor-page" *ngIf="!loading && actor">
  <button class="back-btn" (click)="goBack()">
    <mat-icon>arrow_back</mat-icon>
    <span>Back</span>
  </button>

  <div class="actor-profile">
    <div class="actor-photo-frame">
      <img [src]="actor.imageUrl" [alt]="actor.name">
    </div>
    <div class="actor-info">
      <h1 class="actor-name">{{ actor.name }}</h1>
      <p class="actor-film-count">{{ actor.films.length }} film{{ actor.films.length !== 1 ? 's' : '' }}</p>
    </div>
  </div>

  <div class="filmography-section" *ngIf="actor.films.length > 0">
    <h2 class="section-title">Filmography</h2>
    <div class="film-grid">
      <a class="film-card" *ngFor="let film of actor.films" [routerLink]="['/film', film.filmId]">
        <div class="film-poster">
          <img [src]="film.imageUrl" [alt]="film.title" loading="lazy">
        </div>
        <span class="film-title">{{ film.title }}</span>
      </a>
    </div>
  </div>
</div>

<div class="loading-state" *ngIf="loading">
  <mat-spinner diameter="48"></mat-spinner>
  <p>Loading actor details...</p>
</div>
