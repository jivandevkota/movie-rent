<div class="login-wrapper">
  <div class="login-card">
    <h1 class="login-title">Sign In</h1>
    <p class="login-subtitle">Use your email and password to continue</p>

    <form (ngSubmit)="onLogin()" class="login-form">

      <div class="field-group">
        <label class="field-label" for="email">Email</label>
        <input type="email" id="email" class="field-input"
          [(ngModel)]="email" name="email"
          placeholder="e.g. MARY.SMITH@sakilacustomer.org" required>
      </div>

      <div class="field-group">
        <label class="field-label" for="password">Password</label>
        <input type="password" id="password" class="field-input"
          [(ngModel)]="password" name="password"
          placeholder="Enter your password" required>
      </div>

      <div class="error-msg" *ngIf="error">{{ error }}</div>

      <button type="submit" class="login-btn" [disabled]="loading">
        {{ loading ? 'Signing in...' : 'Sign In' }}
      </button>
    </form>

    <p class="hint">Use your registered email and password to sign in</p>
    <p class="staff-link"><a routerLink="/staff-login">Staff Portal</a></p>
  </div>
</div>
