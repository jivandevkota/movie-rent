      <a class="nav-link" routerLink="/cart" routerLinkActive="active" *ngIf="isCustomer">Cart</a>
      <a class="nav-link" routerLink="/orders" routerLinkActive="active" *ngIf="isCustomer">Orders</a>
      <a class="nav-link" routerLink="/my-rentals" routerLinkActive="active" *ngIf="isCustomer">Rentals</a>
      <a class="nav-link" routerLink="/payments" routerLinkActive="active" *ngIf="isCustomer">Payments</a>
